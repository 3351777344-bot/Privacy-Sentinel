name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: platform/backend/requirements-dev.txt
      - name: Install backend dependencies
        run: python -m pip install -r platform/backend/requirements-dev.txt
      - name: Run backend tests
        working-directory: platform/backend
        run: python -m pytest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: platform/frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: platform/frontend
        run: npm test
      - name: Build frontend
        working-directory: platform/frontend
        run: npm run build
