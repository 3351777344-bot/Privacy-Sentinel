name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: platform/backend/requirements-dev.txt
      - name: Install backend dependencies
        run: python -m pip install -r platform/backend/requirements-dev.txt
      - name: Run backend tests
        working-directory: platform/backend
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: platform/frontend
        run: npm ci --no-audit --no-fund
      - name: Run frontend tests
        working-directory: platform/frontend
        run: npm test
      - name: Build frontend
        working-directory: platform/frontend
        run: npm run build
